<section class="mx-auto max-w-4xl p-4 md:p-6">
    <h1 class="text-2xl font-bold text-white mb-6">Password Generator</h1>

    <div
        class="bg-gray-900 border border-gray-800 rounded-2xl p-5 md:p-6 space-y-6">
        <div>
            <label
                class="block text-xs uppercase tracking-[0.16em] text-gray-500 mb-2">Generated
                Password</label>
            <div class="flex flex-col sm:flex-row gap-3">
                <input
                    [value]="generatedPassword()"
                    readonly
                    class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-gray-100 font-mono text-sm focus:outline-none" />
                <button
                    type="button"
                    (click)="generatePassword()"
                    class="px-4 py-3 rounded-xl bg-white text-gray-900 text-sm font-semibold hover:bg-gray-200 transition">
                    Regenerate
                </button>
                <button
                    type="button"
                    (click)="copyPassword()"
                    class="px-4 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold transition">
                    Copy
                </button>
            </div>
            @if (copyStatus() === 'copied') {
            <p class="text-emerald-400 text-sm mt-2">Copied to
                clipboard.</p>
            }
            @if (copyStatus() === 'error') {
            <p class="text-red-400 text-sm mt-2">Could not copy
                automatically.</p>
            }
        </div>

        <div>
            <div class="flex items-center justify-between mb-2">
                <label class="text-sm text-gray-300">Length</label>
                <span class="text-sm text-indigo-300 font-semibold">{{
                    length()
                    }}</span>
            </div>
            <div class="flex items-center gap-3 mb-3">
                <div class="w-40">
                    <app-number-stepper
                        [value]="length()"
                        [min]="8"
                        [max]="64"
                        (valueChange)="setLength($event)" />
                </div>
                <span
                    class="text-xs text-gray-500 uppercase tracking-[0.16em]">8-64
                    chars</span>
            </div>
            <input
                type="range"
                min="8"
                max="64"
                [value]="length()"
                (input)="onLengthChange($event)"
                class="w-full accent-indigo-500" />
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <label
                class="flex items-center gap-3 text-sm text-gray-200 bg-gray-950 rounded-xl border border-gray-800 px-3 py-2.5">
                <input type="checkbox" [checked]="includeUppercase()"
                    (change)="setIncludeUppercase($event)"
                    class="accent-indigo-500" />
                Uppercase (A-Z)
            </label>
            <label
                class="flex items-center gap-3 text-sm text-gray-200 bg-gray-950 rounded-xl border border-gray-800 px-3 py-2.5">
                <input type="checkbox" [checked]="includeLowercase()"
                    (change)="setIncludeLowercase($event)"
                    class="accent-indigo-500" />
                Lowercase (a-z)
            </label>
            <label
                class="flex items-center gap-3 text-sm text-gray-200 bg-gray-950 rounded-xl border border-gray-800 px-3 py-2.5">
                <input type="checkbox" [checked]="includeNumbers()"
                    (change)="setIncludeNumbers($event)"
                    class="accent-indigo-500" />
                Numbers (0-9)
            </label>
            <label
                class="flex items-center gap-3 text-sm text-gray-200 bg-gray-950 rounded-xl border border-gray-800 px-3 py-2.5">
                <input type="checkbox" [checked]="includeSymbols()"
                    (change)="setIncludeSymbols($event)"
                    class="accent-indigo-500" />
                Symbols (!@#$...)
            </label>
            <label
                class="flex items-center gap-3 text-sm text-gray-200 bg-gray-950 rounded-xl border border-gray-800 px-3 py-2.5 sm:col-span-2">
                <input type="checkbox" [checked]="avoidAmbiguous()"
                    (change)="setAvoidAmbiguous($event)"
                    class="accent-indigo-500" />
                Avoid similar characters (0/O, 1/l/I)
            </label>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <label
                class="block text-sm text-gray-200 bg-gray-950 rounded-xl border border-gray-800 px-3 py-3">
                <span
                    class="block text-xs uppercase tracking-[0.16em] text-gray-500 mb-2">Minimum
                    Numbers</span>
                <app-number-stepper
                    [value]="minNumbers()"
                    [min]="0"
                    [max]="64"
                    [disabled]="!includeNumbers()"
                    (valueChange)="setMinNumbers($event)" />
            </label>

            <label
                class="block text-sm text-gray-200 bg-gray-950 rounded-xl border border-gray-800 px-3 py-3">
                <span
                    class="block text-xs uppercase tracking-[0.16em] text-gray-500 mb-2">Minimum
                    Symbols</span>
                <app-number-stepper
                    [value]="minSymbols()"
                    [min]="0"
                    [max]="64"
                    [disabled]="!includeSymbols()"
                    (valueChange)="setMinSymbols($event)" />
            </label>
        </div>

    </div>
</section>
