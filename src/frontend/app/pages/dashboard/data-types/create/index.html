<section class="mx-auto max-w-4xl p-4 md:p-6">
    <div class="mb-4 flex items-center justify-between">
        <h1 class="text-2xl font-semibold text-zinc-100">Create Data Type</h1>
        <a
            routerLink="/dashboard/data-types"
            class="rounded-lg border border-zinc-700 px-3 py-2 text-sm text-zinc-200 hover:bg-zinc-800">
            Back
        </a>
    </div>

    <div
        class="rounded-xl border border-zinc-800 bg-zinc-900/70 p-4 shadow-lg shadow-black/20 md:p-6">
        <div class="space-y-4">
            <div>
                <label for="title"
                    class="mb-2 block text-xs font-medium uppercase tracking-wide text-zinc-400">Type
                    Name</label>
                <input
                    id="title"
                    type="text"
                    [(ngModel)]="title"
                    placeholder="Bank account, Social login, Wi-Fi"
                    class="w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-zinc-100 outline-none ring-zinc-300 placeholder:text-zinc-500 focus:border-zinc-500 focus:ring" />
            </div>

            <div>
                <div class="mb-2 flex items-center justify-between">
                    <p
                        class="text-xs font-medium uppercase tracking-wide text-zinc-400">Fields</p>
                    <button
                        type="button"
                        (click)="addField()"
                        class="rounded-md border border-zinc-700 px-2.5 py-1.5 text-xs font-medium text-zinc-200 hover:bg-zinc-800">
                        Add Field
                    </button>
                </div>

                <div class="space-y-2">
                    @for (field of fields; track $index) {
                    <div
                        class="grid grid-cols-1 gap-2 rounded-lg border border-zinc-800 bg-zinc-950/60 p-3 md:grid-cols-[1fr_180px_auto]">
                        <input
                            type="text"
                            [(ngModel)]="field.name"
                            placeholder="Field name"
                            class="rounded-lg border border-zinc-700 bg-zinc-900 px-3 py-2 text-sm text-zinc-100 outline-none focus:border-zinc-500" />

                        <select
                            [(ngModel)]="field.type"
                            class="rounded-lg border border-zinc-700 bg-zinc-900 px-3 py-2 text-sm text-zinc-100 outline-none focus:border-zinc-500">
                            @for (fieldType of fieldTypes; track fieldType) {
                            <option [value]="fieldType">{{ fieldType }}</option>
                            }
                        </select>

                        <button
                            type="button"
                            (click)="removeField($index)"
                            class="rounded-md border border-red-900/80 px-3 py-2 text-xs font-medium text-red-300 hover:bg-red-900/30">
                            Remove
                        </button>
                    </div>
                    }
                </div>
            </div>

            @if (errorMessage) {
            <p
                class="rounded-md border border-red-900/70 bg-red-950/40 px-3 py-2 text-sm text-red-300">
                {{ errorMessage }}
            </p>
            }

            <div class="flex justify-end gap-2 pt-2">
                <a
                    routerLink="/dashboard/data-types"
                    class="rounded-lg border border-zinc-700 px-4 py-2 text-sm font-medium text-zinc-200 hover:bg-zinc-800">
                    Cancel
                </a>
                <button
                    type="button"
                    (click)="createType()"
                    [disabled]="isSaving"
                    class="rounded-lg bg-zinc-100 px-4 py-2 text-sm font-semibold text-zinc-900 transition hover:bg-white disabled:cursor-not-allowed disabled:opacity-60">
                    {{ isSaving ? 'Creating...' : 'Create' }}
                </button>
            </div>
        </div>
    </div>
</section>
