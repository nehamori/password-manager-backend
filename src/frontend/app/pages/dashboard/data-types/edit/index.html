<section class="mx-auto max-w-4xl p-4 md:p-6">
    <div class="mb-4 flex items-center justify-between">
        <h1 class="text-2xl font-semibold text-zinc-100">Edit Data Type</h1>
        <a
            routerLink="/dashboard/data-types"
            class="rounded-lg border border-zinc-700 px-3 py-2 text-sm text-zinc-200 hover:bg-zinc-800">
            Back
        </a>
    </div>

    @if (isLoading()) {
    <div
        class="rounded-xl border border-zinc-800 bg-gray-900 p-8 text-center text-sm text-zinc-400">
        Loading...
    </div>
    } @else {
    <div
        class="rounded-xl border border-zinc-800 bg-gray-900 p-4 shadow-lg shadow-black/20 md:p-6">
        <div class="space-y-4">
            <div>
                <label for="title"
                    class="mb-2 block text-xs font-medium uppercase tracking-wide text-zinc-400">Type
                    Name</label>
                <input
                    id="title"
                    type="text"
                    [(ngModel)]="title"
                    class="w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-zinc-100 outline-none ring-zinc-300 focus:border-zinc-500 focus:ring" />
            </div>

            <div class="flex justify-end">
                <button
                    type="button"
                    (click)="saveAll()"
                    [disabled]="isSaving"
                    class="rounded-lg border border-zinc-600 px-3 py-2 text-sm font-medium text-zinc-100 hover:bg-zinc-800 disabled:opacity-60">
                    {{ isSaving ? 'Saving...' : 'Save Changes' }}
                </button>
            </div>

            <div>
                <div class="mb-2 flex items-center justify-between">
                    <p
                        class="text-xs font-medium uppercase tracking-wide text-zinc-400">Fields</p>
                    <button
                        type="button"
                        (click)="addField()"
                        class="rounded-md border border-zinc-700 px-2.5 py-1.5 text-xs font-medium text-zinc-200 hover:bg-zinc-800">
                        Add Field
                    </button>
                </div>

                <div class="space-y-2">
                    @for (field of fields; track field.id === 0 ? $index :
                    field.id) {
                    <div class="overflow-x-auto">
                        <div
                            class="grid min-w-[360px] grid-cols-[minmax(0,1fr)_120px_auto] gap-2 rounded-lg border border-zinc-800 bg-zinc-950/60 p-3">
                            <input
                                type="text"
                                [ngModel]="field.name"
                                (ngModelChange)="updateFieldName($index, $event)"
                                [ngModelOptions]="{ standalone: true }"
                                placeholder="Field name"
                                class="rounded-lg border border-zinc-700 bg-zinc-900 px-3 py-2 text-sm text-zinc-100 outline-none focus:border-zinc-500" />

                            <select
                                [ngModel]="field.type"
                                (ngModelChange)="updateFieldType($index, $event)"
                                [ngModelOptions]="{ standalone: true }"
                                class="rounded-lg border border-zinc-700 bg-zinc-900 px-3 py-2 text-sm text-zinc-100 outline-none focus:border-zinc-500">
                                @for (fieldType of fieldTypes; track fieldType)
                                {
                                <option [value]="fieldType">{{ fieldType
                                    }}</option>
                                }
                            </select>

                            <button
                                type="button"
                                (click)="removeField($index)"
                                class="inline-flex items-center justify-center rounded-md border border-red-900/80 px-3 py-2 text-red-300 hover:bg-red-900/30"
                                title="Remove field"
                                aria-label="Remove field">
                                <svg xmlns="http://www.w3.org/2000/svg"
                                    viewBox="0 0 24 24" fill="currentColor"
                                    class="h-4 w-4">
                                    <path
                                        d="M9 3a1 1 0 0 0-1 1v1H5a1 1 0 1 0 0 2h.6l.93 11.17A3 3 0 0 0 9.52 21h4.96a3 3 0 0 0 2.99-2.83L18.4 7H19a1 1 0 1 0 0-2h-3V4a1 1 0 0 0-1-1H9Zm2 2V5h2v0h-2Zm-2.46 2h6.92l-.88 10.53a1 1 0 0 1-1 .94H10.42a1 1 0 0 1-1-.94L8.54 7Zm1.96 2.5a1 1 0 0 0-1 1v5a1 1 0 1 0 2 0v-5a1 1 0 0 0-1-1Zm4 0a1 1 0 0 0-1 1v5a1 1 0 1 0 2 0v-5a1 1 0 0 0-1-1Z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    }

                    @if (fields.length === 0) {
                    <div
                        class="rounded-lg border border-dashed border-zinc-700 p-6 text-center text-sm text-zinc-500">
                        No fields yet.
                    </div>
                    }
                </div>
            </div>

            @if (errorMessage) {
            <p
                class="rounded-md border border-red-900/70 bg-red-950/40 px-3 py-2 text-sm text-red-300">
                {{ errorMessage }}
            </p>
            }

            <div class="flex justify-end pt-2">
                <button
                    type="button"
                    (click)="deleteType()"
                    class="rounded-lg border border-red-900/80 px-4 py-2 text-sm font-medium text-red-300 hover:bg-red-900/30">
                    Delete Type
                </button>
            </div>
        </div>
    </div>
    }
</section>
