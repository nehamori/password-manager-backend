<h2 class="text-2xl font-bold text-white text-center mb-6">
    Sign In
</h2>

<form (ngSubmit)="alert" class="space-y-4">

    <input
        type="text"
        name="login"
        placeholder="Login"
        class="w-full px-4 py-2 bg-gray-800 text-white rounded-lg" />

    <input
        type="password"
        name="password"
        placeholder="Password"
        class="w-full px-4 py-2 bg-gray-800 text-white rounded-lg" />

    <button
        type="submit"
        class="w-full py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg">
        Login
    </button>

</form>
