<div class="min-h-screen bg-gray-950 text-white flex flex-col">
    <nav
        class="max-w-7xl mx-auto w-full px-6 py-6 flex justify-between items-center">
        <a href="/" class="flex items-center gap-3 font-semibold text-lg">
            <img src="/favicon.jpg" alt="BlinkPass logo"
                class="w-8 h-8 object-contain">
            BlinkPass
        </a>
        <div class="hidden md:flex items-center gap-8 text-sm text-gray-400">
            <a
                href="/"
                class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-white font-semibold transition">
                Home
            </a>
        </div>
    </nav>

    <section
        class="max-w-7xl mx-auto w-full px-6 pt-10 pb-20 flex-1 flex items-center justify-center">
        <div class="w-full max-w-xl">
            <div
                class="bg-gray-900 border border-gray-800 rounded-2xl shadow-xl shadow-black/20 p-6 md:p-8">
                <div class="mb-6 text-center">
                    <h1 class="text-2xl md:text-3xl font-bold text-white mb-2">
                        Continue to BlinkPass
                    </h1>
                    @if (isElectron) {
                    <p class="text-sm text-gray-400">
                        Continue in your browser to sign in with social
                        providers.
                    </p>
                    } @else {
                    <p class="text-sm text-gray-400">
                        Enter your email to start secure access.
                    </p>
                    }
                </div>

                @if (isElectron) {
                <button
                    type="button"
                    (click)="openWebsiteLogin()"
                    class="block w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-semibold text-center transition">
                    Log In Through Social Networks
                </button>
                } @else {
                <div class="space-y-4">
                    <input
                        type="email"
                        name="email"
                        placeholder="Email"
                        class="w-full px-4 py-3 bg-gray-950 border border-gray-800 text-white rounded-xl placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" />

                    <button
                        type="button"
                        class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-semibold transition">
                        Continue
                    </button>
                </div>

                <div class="flex items-center my-8">
                    <div class="flex-1 h-px bg-gray-800"></div>
                    <span
                        class="px-3 text-gray-500 text-sm uppercase tracking-[0.24em]">or</span>
                    <div class="flex-1 h-px bg-gray-800"></div>
                </div>

                <app-login-auth-widgets></app-login-auth-widgets>
                }
            </div>
        </div>
    </section>

    <footer class="mt-auto border-t border-gray-800">
        <div
            class="max-w-7xl mx-auto px-6 py-10 flex flex-col md:flex-row justify-between text-sm text-gray-500 gap-3">
            <div>© 2026 BlinkPass</div>
            <div>Consistent secure access across every screen</div>
        </div>
    </footer>
</div>
