name: Release Desktop And Android

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    electron:
        name: Electron (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [windows-latest, macos-latest, ubuntu-latest]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Resolve version from tag
              shell: bash
              run: |
                  RAW_REF="${GITHUB_REF_NAME}"

                  if [[ "$RAW_REF" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                    MAJOR="${BASH_REMATCH[1]}"
                    MINOR="${BASH_REMATCH[2]}"
                    PATCH="${BASH_REMATCH[3]}"
                  else
                    APP_VERSION_FROM_PACKAGE="$(node -p "require('./package.json').version")"
                    if [[ "$APP_VERSION_FROM_PACKAGE" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                      MAJOR="${BASH_REMATCH[1]}"
                      MINOR="${BASH_REMATCH[2]}"
                      PATCH="${BASH_REMATCH[3]}"
                    else
                      MAJOR=0
                      MINOR=0
                      PATCH=0
                    fi
                  fi

                  APP_VERSION="${MAJOR}.${MINOR}.${PATCH}"
                  APP_VERSION_CODE="$((MAJOR * 10000 + MINOR * 100 + PATCH))"

                  echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
                  echo "APP_VERSION_CODE=${APP_VERSION_CODE}" >> "$GITHUB_ENV"

            - name: Apply version to package.json
              run: npm version "$APP_VERSION" --no-git-tag-version

            - name: Install Linux packaging tools
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libarchive-tools

            - name: Build Angular (electron)
              run: npm run build:electron

            - name: Build Electron app
              run: npx electron-builder --publish never
              env:
                  RELEASE_VERSION: ${{ env.APP_VERSION }}

            - name: Upload Windows installer to release
              if: matrix.os == 'windows-latest'
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/electron/*.exe
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload macOS installer to release
              if: matrix.os == 'macos-latest'
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/electron/*.dmg
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Linux installer to release
              if: matrix.os == 'ubuntu-latest'
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      dist/electron/*.AppImage
                      dist/electron/*.deb
                      dist/electron/*.pacman
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    android:
        name: Android (ubuntu-latest)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            - name: Install dependencies
              run: npm ci

            - name: Resolve version from tag
              shell: bash
              run: |
                  RAW_REF="${GITHUB_REF_NAME}"

                  if [[ "$RAW_REF" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                    MAJOR="${BASH_REMATCH[1]}"
                    MINOR="${BASH_REMATCH[2]}"
                    PATCH="${BASH_REMATCH[3]}"
                  else
                    APP_VERSION_FROM_PACKAGE="$(node -p "require('./package.json').version")"
                    if [[ "$APP_VERSION_FROM_PACKAGE" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                      MAJOR="${BASH_REMATCH[1]}"
                      MINOR="${BASH_REMATCH[2]}"
                      PATCH="${BASH_REMATCH[3]}"
                    else
                      MAJOR=0
                      MINOR=0
                      PATCH=0
                    fi
                  fi

                  APP_VERSION="${MAJOR}.${MINOR}.${PATCH}"
                  APP_VERSION_CODE="$((MAJOR * 10000 + MINOR * 100 + PATCH))"

                  echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
                  echo "APP_VERSION_CODE=${APP_VERSION_CODE}" >> "$GITHUB_ENV"

            - name: Apply versions to manifests
              shell: bash
              run: |
                  npm version "$APP_VERSION" --no-git-tag-version
                  node -e "const fs=require('fs'); const path='android/app/build.gradle'; let content=fs.readFileSync(path,'utf8'); content=content.replace(/versionCode\s+\d+/, 'versionCode '+process.env.APP_VERSION_CODE); content=content.replace(/versionName\s+\"[^\"]+\"/, 'versionName \"'+process.env.APP_VERSION+'\"'); fs.writeFileSync(path, content);"

            - name: Build Angular (android)
              run: npm run build:android

            - name: Sync Capacitor
              run: npx cap sync android

            - name: Decode keystore
              run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore

            - name: Build signed APK
              run: |
                  cd android
                  ./gradlew assembleRelease \
                    -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore \
                    -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_STORE_PASSWORD }} \
                    -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
                    -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

            - name: Rename APK
              run: cp android/app/build/outputs/apk/release/app-release.apk "android/app/build/outputs/apk/release/BlinkPass-${{ env.APP_VERSION }}-android.apk"

            - name: Upload APK to release
              uses: softprops/action-gh-release@v2
              with:
                  files: android/app/build/outputs/apk/release/BlinkPass-${{ env.APP_VERSION }}-android.apk
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
